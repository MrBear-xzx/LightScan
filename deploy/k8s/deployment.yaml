apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightscan-backend
  labels:
    app: lightscan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lightscan
  template:
    metadata:
      labels:
        app: lightscan
    spec:
      containers:
        - name: backend
          image: lightscan-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: lightscan-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lightscan-secret
                  key: SECRET_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
