services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lightscan
      POSTGRES_USER: lightscan
      POSTGRES_PASSWORD: lightscan
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lightscan:lightscan@postgres:5432/lightscan
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
